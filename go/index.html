<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Opening Carousell… — Clair Oral Care</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link rel="stylesheet" href="../style.css">

<!-- Cloudflare Web Analytics (cookie-free) — same token on / and sg/ -->
<script type="module" src="https://static.cloudflareinsights.com/beacon.min.js" data-cf-beacon='{"token": "0cd597626e144c0b8d7d5eea46ce97aa"}' id="cf-beacon"></script>
</head>
<body>

<div class="hero">
  <img class="hero-logo" src="../images/logo-oralcare.png" alt="Clair Oral Care">
  <p class="tag">Taking you to our Carousell store…</p>
  <div class="actions">
    <a class="btn primary" id="fallback" href="https://www.carousell.sg/u/clair.oral" target="_self" rel="noopener">Continue to Carousell →</a>
  </div>
</div>

<script>
(function () {
  // Product key → Carousell listing. Keys are what appear in your analytics
  // "top pages" report, so each one tells you which button was clicked.
  var LINKS = {
    'sonic-toothbrush':   'https://www.carousell.sg/p/clair-sonic-toothbrush-cr409-1450063285/',
    'water-flosser':      'https://www.carousell.sg/p/clair-cordless-water-flosser-cr503-1450064841/',
    'tongue-steel':       'https://www.carousell.sg/p/clair-stainless-steel-tongue-cleaner-cr210-1450065735/',
    'tongue-copper':      'https://www.carousell.sg/p/clair-pure-copper-tongue-cleaner-cr220-1450066524/',
    'flossmate':          'https://www.carousell.sg/p/clair-flossmate-floss-pick-pouch-50s-cr090-1450067057/',
    'durafloss':          'https://www.carousell.sg/p/clair-durafloss-25s-box-cr228-1450069144/',
    'ortho-set':          'https://www.carousell.sg/p/clair-orthodontic-toothbrush-set-2pcs-cr124-1450070147/',
    'toothpaste-enamel':  'https://www.carousell.sg/p/sensiclair-enamel-care-whitening-toothpaste-60g-pump-dispenser-1450322639/',
    'toothpaste-f':       'https://www.carousell.sg/p/sensiclair-f-fluoride-toothpaste-60g-icy-peach-pump-dispenser-1450322836/',
    'bundle-from-serum':  'https://www.carousell.sg/p/clair-whitening-kit-v34-purple-serum-pap-strips-bundle-1450284432/',
    'bundle-from-strips': 'https://www.carousell.sg/p/clair-whitening-kit-v34-purple-serum-pap-strips-bundle-1450284432/',
    'profile-nav':        'https://www.carousell.sg/u/clair.oral',
    'profile-hero':       'https://www.carousell.sg/u/clair.oral',
    'profile-banner':     'https://www.carousell.sg/u/clair.oral'
  };

  var key = new URLSearchParams(window.location.search).get('p') || '';
  var dest = LINKS[key] || 'https://www.carousell.sg/u/clair.oral';

  document.getElementById('fallback').href = dest;

  // Wait for the analytics beacon to actually load before navigating away,
  // so the click is never lost on a slow connection. Capped so a blocked or
  // failed beacon can't strand the visitor; instant if no analytics present.
  var beacon = document.getElementById('cf-beacon');
  var done = false;
  function go() {
    if (done) return;
    done = true;
    window.location.replace(dest);
  }

  if (!beacon) {
    go();
  } else {
    // beacon fires its hit on load; small buffer lets the request leave
    beacon.addEventListener('load', function () { window.setTimeout(go, 150); });
    beacon.addEventListener('error', go);
    window.setTimeout(go, 1500); // hard cap
  }
})();
</script>

</body>
</html>
